[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.26"
optimizer = true
optimizer_runs = 200
via_ir = true

# RPC endpoint for the live fork tests (GeometricResidualProof and
# DirectionalExitForkProof). Any working Base RPC URL with archive support
# works; the public endpoint https://mainnet.base.org is sufficient.
# Set RPC_BASE_ALCHEMY in your shell to the RPC URL of your choice; the
# env-var name is preserved for compatibility with the original test setup.
[rpc_endpoints]
base = "${RPC_BASE_ALCHEMY}"
